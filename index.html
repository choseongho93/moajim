      <div style="max-width:800px;margin:0 auto;padding:40px 20px;font-family:sans-serif;color:#333">
        <h1 style="font-size:2em;margin-bottom:16px">모아짐 - 스마트한 자산 관리 플랫폼</h1>
        <p style="font-size:1.1em;margin-bottom:24px;color:#666">
          복잡한 포트폴리오 분석과 부동산 세금 계산을 쉽게. 회원가입 없이 모든 기능을 무료로 사용하세요.
        </p>
        <h2 style="font-size:1.4em;margin-bottom:12px">주요 기능</h2>
        <ul style="line-height:2;margin-bottom:24px">
          <li><strong>자산 포트폴리오 분석</strong> - 현금, 주식, 부동산, 귀금속 등 보유 자산을 입력하면 투자 대가들의 포트폴리오와 비교하여 맞춤 조언을 제공합니다.</li>
          <li><strong>증여세 계산기</strong> - 가족 간 증여 시 발생하는 증여세를 현행 세법에 맞춰 정확하게 계산합니다.</li>
          <li><strong>상속세 계산기</strong> - 상속 재산에 대한 세금을 배우자, 자녀 등 상속인별로 상세하게 계산합니다.</li>
          <li><strong>취득세 계산기</strong> - 부동산 구매 시 내야 하는 취득세를 간편하게 계산합니다.</li>
          <li><strong>양도소득세 계산기</strong> - 부동산 매도 시 발생하는 양도소득세를 계산합니다.</li>
          <li><strong>보유세 계산기</strong> - 재산세와 종합부동산세를 정확하게 계산합니다.</li>
          <li><strong>2026 보유세 예측하기</strong> - 2026년 보유세를 시뮬레이션합니다.</li>
          <li><strong>중개보수 계산기</strong> - 부동산 중개수수료를 쉽고 빠르게 계산합니다.</li>
          <li><strong>법무사 보수료 계산기</strong> - 부동산 등기 법무사 비용을 계산합니다.</li>
          <li><strong>전월세 전환 계산기</strong> - 전세 ↔ 월세 전환 적정 금액을 계산합니다.</li>
          <li><strong>대출 이자 계산기</strong> - 상환방법별 월 상환금과 총 이자를 계산합니다.</li>
          <li><strong>담보 대출 가능액 계산기</strong> - LTV 기준 담보 대출 가능 금액을 계산합니다.</li>
          <li><strong>예적금 이자 계산기</strong> - 예금·적금 이자 수익을 단리/복리로 계산합니다.</li>
          <li><strong>중도상환수수료 계산기</strong> - 대출 중도상환 시 발생하는 수수료를 계산합니다.</li>
          <li><strong>대출 대환 계산기</strong> - 대출 대환 시 변경되는 이자를 비교합니다.</li>
          <li><strong>추정소득 계산기</strong> - 인정소득·신고소득 기준으로 추정 연소득을 계산합니다.</li>
          <li><strong>경락잔금대출 한도 계산기</strong> - 경매 낙찰 시 금융권별 대출 가능 한도를 계산합니다.</li>
          <li><strong>전세보증보험 계산기</strong> - 전세보증보험 보증료를 기관별로 비교 계산합니다.</li>
        </ul>
        <h2 style="font-size:1.4em;margin-bottom:12px">왜 모아짐인가요?</h2>
        <ul style="line-height:2;margin-bottom:24px">
          <li><strong>간편하고 빠르게</strong> - 복잡한 계산 없이 필요한 정보만 입력하면 즉시 결과를 확인할 수 있습니다.</li>
          <li><strong>정확한 계산</strong> - 현행 세법을 정확히 반영하여 신뢰할 수 있는 계산 결과를 제공합니다.</li>
          <li><strong>완전 무료</strong> - 회원가입 없이 모든 기능을 무료로 제한 없이 사용할 수 있습니다.</li>
        </ul>
